naftiko: "1.0.0-alpha2"

info:
  label: "Slice Public API (v2) — Orders"
  description: >-
    Orders surface of the Slice Public API v2. 4 operations. Lead operation: Create Order.
    Self-contained Naftiko capability covering one Slice business surface.
  tags:
    - Slice
    - Online Ordering
    - Orders
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      SLICE_API_KEY: SLICE_API_KEY

capability:

  consumes:
    - type: http
      namespace: "slice-public-api-v2-orders"
      # Slice does not publicly publish the API server URL; partners receive it with credentials.
      baseUri: "https://developer.slicelife.com"
      description: "Slice Public API v2 — Orders business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.SLICE_API_KEY}}"
        placement: header
      resources:
        - name: "orders"
          path: "/orders"
          operations:
            - name: "createOrder"
              method: POST
              description: "Create Order"
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Order payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "orders-orderid"
          path: "/orders/{orderID}"
          operations:
            - name: "getOrder"
              method: GET
              description: "Get Order"
              inputParameters:
                - name: "orderID"
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the order."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: "updateOrder"
              method: PUT
              description: "Update Order"
              inputParameters:
                - name: "orderID"
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the order."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Order payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: "deleteOrder"
              method: DELETE
              description: "Delete Order"
              inputParameters:
                - name: "orderID"
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the order."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "slice-public-api-v2-orders-rest"
      port: 8080
      description: "REST adapter for Slice Public API v2 — Orders. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/orders"
          name: "orders"
          description: "REST surface for /orders."
          operations:
            - method: POST
              name: "createOrder"
              description: "Create Order"
              call: "slice-public-api-v2-orders.createOrder"
              with:
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/orders/{orderid}"
          name: "orders-orderid"
          description: "REST surface for /orders/{orderID}."
          operations:
            - method: GET
              name: "getOrder"
              description: "Get Order"
              call: "slice-public-api-v2-orders.getOrder"
              with:
                "orderID": "rest.orderID"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: "updateOrder"
              description: "Update Order"
              call: "slice-public-api-v2-orders.updateOrder"
              with:
                "orderID": "rest.orderID"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: "deleteOrder"
              description: "Delete Order"
              call: "slice-public-api-v2-orders.deleteOrder"
              with:
                "orderID": "rest.orderID"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "slice-public-api-v2-orders-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Slice Public API v2 — Orders. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "create-order"
          description: "Create Order"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "slice-public-api-v2-orders.createOrder"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-order"
          description: "Get Order"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "slice-public-api-v2-orders.getOrder"
          with:
            "orderID": "tools.orderID"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-order"
          description: "Update Order"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "slice-public-api-v2-orders.updateOrder"
          with:
            "orderID": "tools.orderID"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "delete-order"
          description: "Delete Order"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "slice-public-api-v2-orders.deleteOrder"
          with:
            "orderID": "tools.orderID"
          outputParameters:
            - type: object
              mapping: "$."
