aid: slice
name: Slice
description: >-
  Slice is an online ordering and management platform built specifically for
  independent local pizzerias, giving small shops digital ordering, marketing,
  loyalty, and back-office tools that compete with large delivery marketplaces
  at a low flat per-order fee. For technology partners, Slice publishes a Slice
  Public API documented on a Stoplight developer portal, exposing
  pizzeria-oriented resources such as shops, menus, and orders over a RESTful
  HTTP interface. The platform serves pizzeria owners and the partners that
  integrate ordering, POS, and operations into the Slice network across
  thousands of locations.
